<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Logo Banco Estudiantil">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a4d68"/>
      <stop offset="100%" stop-color="#0f6b8a"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="116" height="116" rx="20" fill="url(#g)"/>
  <!-- Mortarboard (graduation cap) -->
