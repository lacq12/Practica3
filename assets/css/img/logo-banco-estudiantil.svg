    <path d="M104 46 v22" stroke="#ffffff" stroke-width="4" fill="none"/>
    <circle cx="104" cy="70" r="4" fill="#ffffff"/>
  </g>
  <!-- BE letters -->
  <g fill="#ffffff" opacity="0.98" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    <text x="30" y="110" font-size="46">BE</text>
